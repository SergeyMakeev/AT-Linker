name: Windows

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  msvc-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake (VS 2022, x64)
        run: cmake -S ${{ github.workspace }} -B build -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        run: cmake --build build --config Release

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: link-export-all-win-x64-Release
          path: |
            build/Release/link-export-all.exe
            build/Release/defgen.lib
